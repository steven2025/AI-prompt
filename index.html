<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI应用开发提示词术语训练平台</title>
  <style>
    :root {
      --bg: #071328;
      --bg-2: #0d1b3d;
      --panel: rgba(13, 31, 65, 0.72);
      --panel-strong: rgba(18, 38, 83, 0.92);
      --text: #eef7ff;
      --muted: #a9bed8;
      --line: rgba(105, 219, 255, 0.22);
      --cyan: #27d7ff;
      --blue: #4f7cff;
      --violet: #8f62ff;
      --pink: #e55cff;
      --good: #48f0a9;
      --warn: #ffd166;
      --shadow: rgba(39, 215, 255, 0.18);
      --radius: 8px;
      --top-height: 86px;
      --side-width: 220px;
    }

    body.light {
      --bg: #eef6ff;
      --bg-2: #f7fbff;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --text: #10213f;
      --muted: #51637d;
      --line: rgba(38, 118, 180, 0.2);
      --cyan: #008fc5;
      --blue: #355eea;
      --violet: #7651dc;
      --pink: #be3cd2;
      --shadow: rgba(49, 111, 194, 0.16);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(39, 215, 255, 0.24), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(143, 98, 255, 0.24), transparent 26%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 58%, #14112d);
      overflow-x: hidden;
    }

    body.light {
      background:
        radial-gradient(circle at 12% 8%, rgba(39, 215, 255, 0.22), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(143, 98, 255, 0.18), transparent 26%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 62%, #f8f0ff);
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--top-height);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 14px 24px;
      background: linear-gradient(90deg, rgba(7, 19, 40, 0.92), rgba(25, 33, 78, 0.78));
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.25);
    }

    body.light .topbar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(242, 247, 255, 0.8));
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 2.1vw, 30px);
      line-height: 1.15;
      letter-spacing: 0;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--violet));
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(39, 215, 255, 0.2);
    }

    body.light .brand h1 { background: linear-gradient(90deg, #006cba, #203c86, #8b40ca); -webkit-background-clip: text; }

    .brand p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .teacher {
      color: var(--cyan);
      font-weight: 700;
      margin-left: 8px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .search-box {
      width: min(32vw, 340px);
      position: relative;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      padding: 0 14px 0 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      box-shadow: inset 0 0 18px rgba(39, 215, 255, 0.06);
    }

    .search-box::before {
      content: "⌕";
      position: absolute;
      left: 13px;
      top: 8px;
      color: var(--cyan);
      font-size: 20px;
    }

    button {
      font: inherit;
      color: var(--text);
      cursor: pointer;
      border: 0;
    }

    .gradient-btn {
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--blue), var(--cyan), var(--violet));
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 26px var(--shadow);
      transition: transform .22s ease, box-shadow .22s ease, filter .22s ease;
    }

    .gradient-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
      box-shadow: 0 16px 34px var(--shadow);
    }

    .layout {
      display: grid;
      grid-template-columns: var(--side-width) minmax(0, 1fr);
      gap: 22px;
      padding: calc(var(--top-height) + 22px) 24px 28px;
    }

    .sidebar {
      position: fixed;
      top: calc(var(--top-height) + 22px);
      left: 24px;
      width: var(--side-width);
      max-height: calc(100vh - var(--top-height) - 42px);
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
      overflow: auto;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      margin: 6px 0;
      padding: 0 12px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      text-align: left;
      transition: all .2s ease;
      border: 1px solid transparent;
    }

    .nav-btn:hover,
    .nav-btn.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(39, 215, 255, 0.18), rgba(143, 98, 255, 0.22));
      border-color: var(--line);
      box-shadow: 0 0 22px var(--shadow);
      transform: translateX(3px);
    }

    body.light .nav-btn:hover,
    body.light .nav-btn.active { color: #16315f; }

    .main {
      grid-column: 2;
      min-width: 0;
    }

    .view {
      display: none;
      animation: rise .32s ease both;
    }

    .view.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-panel,
    .glass-card,
    .term-card,
    .case-card,
    .quiz-card,
    .builder-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.2), 0 0 28px rgba(39, 215, 255, 0.06);
    }

    .hero-panel {
      padding: clamp(24px, 4vw, 44px);
      position: relative;
      overflow: hidden;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      right: -90px;
      top: -90px;
      width: 270px;
      height: 270px;
      border: 1px solid rgba(39, 215, 255, 0.24);
      border-radius: 50%;
      box-shadow: inset 0 0 60px rgba(143, 98, 255, 0.2);
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    p { line-height: 1.75; }
    .muted { color: var(--muted); }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .value-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 22px; }
    .two-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .three-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .glass-card {
      padding: 20px;
      transition: transform .22s ease, border-color .22s ease;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      border-color: rgba(39, 215, 255, 0.5);
    }

    .metric {
      font-size: 30px;
      font-weight: 800;
      color: var(--cyan);
      margin-bottom: 6px;
    }

    .path {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .path span,
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      color: var(--text);
      border: 1px solid var(--line);
      background: rgba(39, 215, 255, 0.1);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 18px;
    }

    .filter-btn {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .filter-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow: 0 8px 20px var(--shadow);
    }

    body.light .filter-btn.active { color: #fff; }

    .term-category {
      margin: 0 0 22px;
    }

    .term-category h3 {
      color: var(--cyan);
      padding-left: 10px;
      border-left: 3px solid var(--cyan);
    }

    .level-nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .level-btn {
      min-height: 74px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      text-align: left;
      transition: all .22s ease;
    }

    .level-btn b {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
      font-size: 15px;
    }

    .level-btn span {
      font-size: 12px;
      line-height: 1.45;
    }

    .level-btn.active,
    .level-btn:hover {
      background: linear-gradient(135deg, rgba(39, 215, 255, 0.18), rgba(143, 98, 255, 0.24));
      border-color: rgba(39, 215, 255, 0.5);
      box-shadow: 0 12px 28px var(--shadow);
      transform: translateY(-2px);
    }

    .level-summary {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(260px, .75fr);
      gap: 16px;
      margin: 0 0 16px;
    }

    .dictionary-content {
      min-height: 320px;
    }

    .term-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .term-card {
      padding: 18px;
      transition: transform .22s ease, border-color .22s ease;
    }

    .term-card:hover {
      transform: translateY(-4px);
      border-color: rgba(229, 92, 255, 0.42);
    }

    .term-card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .example {
      margin-top: 10px;
      padding: 11px 12px;
      border-left: 3px solid var(--cyan);
      background: rgba(39, 215, 255, 0.08);
      color: var(--muted);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .flip-grid {
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    }

    .flip {
      min-height: 250px;
      perspective: 1000px;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 250px;
      transition: transform .62s ease;
      transform-style: preserve-3d;
    }

    .flip:hover .flip-inner { transform: rotateY(180deg); }

    .flip-face {
      position: absolute;
      inset: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(39, 215, 255, 0.12), rgba(143, 98, 255, 0.14)), var(--panel-strong);
      backface-visibility: hidden;
      overflow: auto;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.18);
    }

    .flip-back { transform: rotateY(180deg); }
    .flip-title { font-size: 24px; font-weight: 800; margin-top: 42px; }

    .graph-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, .6fr);
      gap: 18px;
    }

    .graph-stage {
      min-height: 540px;
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 50%, rgba(39, 215, 255, 0.16), transparent 23%),
        radial-gradient(circle at 22% 26%, rgba(143, 98, 255, 0.16), transparent 18%),
        radial-gradient(circle at 80% 74%, rgba(72, 240, 169, 0.1), transparent 18%),
        linear-gradient(rgba(39, 215, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(39, 215, 255, 0.05) 1px, transparent 1px),
        rgba(0, 0, 0, 0.1);
      background-size: 28px 28px;
      overflow: hidden;
    }

    .graph-stage svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .node {
      position: absolute;
      width: 132px;
      min-height: 50px;
      padding: 10px;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: var(--radius);
      border: 1px solid rgba(39, 215, 255, 0.45);
      background: rgba(14, 36, 78, 0.88);
      box-shadow: 0 0 26px rgba(39, 215, 255, 0.14);
      color: #fff;
      font-weight: 700;
      transform: translate(-50%, -50%);
      transition: all .22s ease;
    }

    body.light .node { background: rgba(255, 255, 255, 0.94); color: #143265; }

    .node.center {
      width: 170px;
      min-height: 72px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
    }

    .node.level-node {
      width: 158px;
      min-height: 66px;
      background: linear-gradient(145deg, rgba(39, 215, 255, 0.2), rgba(143, 98, 255, 0.22)), rgba(14, 36, 78, 0.92);
    }

    .node.category-node {
      width: 118px;
      min-height: 44px;
      font-size: 12px;
      border-color: rgba(72, 240, 169, 0.42);
      box-shadow: 0 0 18px rgba(72, 240, 169, 0.12);
    }

    .node:hover,
    .node.active {
      border-color: var(--pink);
      box-shadow: 0 0 34px rgba(229, 92, 255, 0.36);
      transform: translate(-50%, -50%) scale(1.04);
    }

    .case-card {
      padding: 20px;
    }

    .compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 20px 0;
    }

    .compare-card {
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
    }

    .compare-card.professional {
      border-color: rgba(72, 240, 169, 0.45);
      box-shadow: 0 0 26px rgba(72, 240, 169, 0.08);
    }

    .builder {
      display: grid;
      grid-template-columns: minmax(0, .92fr) minmax(360px, 1.08fr);
      gap: 18px;
    }

    .builder-panel {
      padding: 18px;
    }

    .check-group {
      margin-bottom: 18px;
    }

    .check-group h3 {
      font-size: 17px;
      color: var(--cyan);
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label.option {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      cursor: pointer;
    }

    label.option:has(input:checked) {
      color: var(--text);
      border-color: rgba(39, 215, 255, 0.55);
      background: rgba(39, 215, 255, 0.14);
    }

    input[type="checkbox"],
    input[type="radio"] {
      accent-color: var(--cyan);
    }

    textarea {
      width: 100%;
      min-height: 300px;
      resize: vertical;
      padding: 14px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.18);
      outline: none;
      line-height: 1.72;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body.light textarea { background: rgba(255, 255, 255, 0.72); }

    .scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .score {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .score b {
      display: block;
      font-size: 24px;
      color: var(--good);
    }

    .quiz-card {
      padding: 18px;
      margin-bottom: 14px;
    }

    .quiz-options {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .quiz-option {
      width: 100%;
      padding: 12px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .quiz-option.correct { border-color: var(--good); background: rgba(72, 240, 169, 0.14); }
    .quiz-option.wrong { border-color: #ff6b8a; background: rgba(255, 107, 138, 0.14); }

    .answer {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(39, 215, 255, 0.08);
      color: var(--muted);
    }

    .answer.show { display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 14px 0;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .field input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .status-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(39, 215, 255, 0.08);
    }

    .locked-note {
      padding: 24px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .data-table th,
    .data-table td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      color: var(--muted);
      font-size: 14px;
    }

    .data-table th {
      color: var(--text);
      background: rgba(39, 215, 255, 0.1);
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 90;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all .25s ease;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 1050px) {
      :root { --side-width: 188px; }
      .value-grid, .three-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .term-list, .builder, .graph-wrap, .level-summary { grid-template-columns: 1fr; }
      .level-nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .graph-stage { min-height: 460px; }
    }

    @media (max-width: 760px) {
      :root { --top-height: 148px; }
      .topbar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        padding: 12px 14px;
      }
      .top-actions { width: 100%; }
      .search-box { width: 100%; }
      .gradient-btn { flex-shrink: 0; }
      .layout {
        display: block;
        padding: calc(var(--top-height) + 12px) 12px 20px;
      }
      .sidebar {
        position: sticky;
        top: var(--top-height);
        left: auto;
        width: 100%;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin-bottom: 14px;
      }
      .nav-btn {
        min-width: 126px;
        justify-content: center;
        margin: 0;
      }
      .main { grid-column: auto; }
      .value-grid, .two-grid, .three-grid, .compare, .options, .scores, .form-grid { grid-template-columns: 1fr; }
      .level-nav { grid-template-columns: 1fr; }
      .brand p { white-space: normal; }
      .node { width: 112px; font-size: 13px; }
      .node.center { width: 142px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>AI应用开发提示词术语训练平台</h1>
      <p>指导教师 <span class="teacher">/ 鄢清华</span> · 面向非计算机专业学生与企业人士的 AI 编程表达训练工具</p>
    </div>
    <div class="top-actions">

    function escapeHtml(str) {

    function nowText() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;

    function normalizePhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

      return /^\d{11}$/.test(normalizePhone(phone));
    }

    function getAuthStore() {
      const fallback = { users: [], loginLogs: [], actionLogs: [], loginSeq: 0 };
      try {
        return { ...fallback, ...(JSON.parse(localStorage.getItem(AUTH_STORE_KEY)) || {}) };
      } catch (err) {
        return fallback;
      }
    }

    function saveAuthStore(store) {
      localStorage.setItem(AUTH_STORE_KEY, JSON.stringify(store));
    }

    function getRole(name, phone) {
      return name === ADMIN_NAME && normalizePhone(phone) === ADMIN_PHONE ? "admin" : "user";
    }

    function ensureUser(name, phone) {
      const store = getAuthStore();
      const cleanPhone = normalizePhone(phone);
      let user = store.users.find(u => u.phone === cleanPhone);
      const role = getRole(name, cleanPhone);
      if (!user) {
        user = {
          name,
          phone: cleanPhone,
          role,
          firstLoginTime: nowText(),
          loginCount: 0,
          lastLoginTime: "",
          usedModules: []
        };
        store.users.push(user);
      } else {
        user.name = name;
        user.role = role;
      }
      saveAuthStore(store);
      return user;
    }

    function setCurrentUser(user) {
      currentUser = user;
      localStorage.setItem("ai-term-current-user", JSON.stringify(user));
    }

    function loadCurrentUser() {
      try {
        currentUser = JSON.parse(localStorage.getItem("ai-term-current-user")) || null;
      } catch (err) {
        currentUser = null;
      }
    }

    function loginUser(name, phone) {
      const cleanPhone = normalizePhone(phone);
      const role = getRole(name, cleanPhone);
      const store = getAuthStore();
      let user = store.users.find(u => u.phone === cleanPhone && u.name === name);
      if (!user) {
        user = {
          name,
          phone: cleanPhone,
          role,
          registerTime: nowText(),
          loginCount: 0,
          lastLoginTime: "",
          usedModules: []
        };
        store.users.push(user);
      }
      store.loginSeq = Number(store.loginSeq || 0) + 1;
      const loginNo = `LOGIN-${String(store.loginSeq).padStart(5, "0")}`;
      currentSessionId = loginNo;
      user.role = role;
      user.loginCount = Number(user.loginCount || 0) + 1;
      user.lastLoginTime = nowText();
      store.loginLogs.unshift({
        loginNo,
        name: user.name,
        phone: user.phone,
        role: user.role,
        loginTime: user.lastLoginTime,
        source: "登录"
      });
      saveAuthStore(store);
      setCurrentUser(user);
      recordAction("登录", "登录");
      return user;
    }

    function logoutUser() {
      recordAction("退出登录", "登录");

      renderNav();
      renderAuth();
      switchView("home");

    function recordAction(action, moduleName) {
      if (!currentUser) return;
      const store = getAuthStore();
      const user = store.users.find(u => u.phone === currentUser.phone);
      if (user && moduleName && !["登录", "管理员后台"].includes(moduleName)) {
        user.usedModules = Array.from(new Set([...(user.usedModules || []), moduleName]));
      }
      store.actionLogs.unshift({
        sessionId: currentSessionId || "LOCAL-SESSION",
        name: currentUser.name,
        phone: currentUser.phone,
        role: currentUser.role,
        action,
        module: moduleName,
        time: nowText()
      });
      saveAuthStore(store);
    }

    function canAccess(item) {
      if (item.access === "public") return true;
      if (item.access === "admin") return currentUser?.role === "admin";
      return Boolean(currentUser);
    }

    function selectedByGroup() {
      const result = {};
      $$("#builder input[type='checkbox']:checked").forEach(input => {
        result[input.dataset.group] = result[input.dataset.group] || [];
        result[input.dataset.group].push(input.value);
      });
      return result;
    }

    function updatePrompt() {
      const s = selectedByGroup();
      const app = (s["应用类型"] || ["AI 应用原型"]).join("、");
      const file = (s["文件形式"] || ["单文件 HTML"]).join("、");
      const layout = (s["页面布局"] || ["顶部导航栏", "左侧导航键", "共享主显示区", "响应式布局"]).join("、");
      const style = (s["UI 风格"] || ["科技风格", "毛玻璃效果"]).join("、");
      const modules = (s["功能模块"] || ["搜索筛选", "图表可视化"]).join("、");
      const ai = (s["AI 接入"] || ["提示词模板", "模型选择"]).join("、");
      const prompt = `请帮我开发一个${file}程序，应用类型为${app}。\n\n页面结构要求：采用${layout}，点击导航时内容在共享主显示区切换，不跳转新页面。\n\n视觉风格要求：整体使用${style}，界面专业、大气、适合课堂培训和企业展示，同时保证文字清晰可读。\n\n功能模块要求：内置或预留${modules}等功能，所有演示数据使用 JavaScript 数组或 JSON 对象保存，不依赖后端服务器。\n\nAI 接入要求：预留${ai}相关区域，注意不要在代码中写死真实 API Key，方便后续扩展为真实大模型服务。\n\n代码要求：输出完整可运行代码，CSS 和 JavaScript 内嵌，结构清晰、注释适当、交互流畅，并兼容电脑、平板和手机屏幕。`;
      const out = $("#promptOutput");
      if (out) out.value = prompt;
      const selectedCount = Object.values(s).flat().length;
      const groupCount = Object.keys(s).length;
      const full = Math.min(100, 40 + groupCount * 10 + selectedCount * 2);
      const clear = Math.min(100, 55 + groupCount * 7);
      const action = Math.min(100, 50 + selectedCount * 4);
      $("#scoreFull").textContent = full;
      $("#scoreClear").textContent = clear;
      $("#scoreAction").textContent = action;
    }

    async function copyPrompt() {
      const text = $("#promptOutput").value;
      try {
        await navigator.clipboard.writeText(text);
        showToast("提示词已复制");
      } catch (err) {
        $("#promptOutput").select();
        document.execCommand("copy");
        showToast("提示词已复制");
      }
    }

    function renderQuiz() {
      $("#quiz").innerHTML = `
        <div class="section-title">
          <div><h2>小测验</h2><p class="muted">答题后立即显示正确答案和解释，巩固常见 AI 编程术语。</p></div>
          <span class="chip">${quizzes.length} 道题</span>
        </div>
        ${quizzes.map((q, idx) => `
          <article class="quiz-card" data-index="${idx}">
            <h3>${idx + 1}. ${q.q}</h3>
            <div class="quiz-options">
              ${q.options.map((op, opIdx) => `<button class="quiz-option" data-index="${idx}" data-option="${opIdx}">${op}</button>`).join("")}
            </div>
            <div class="answer" id="answer-${idx}">正确答案：${q.options[q.answer]}。${q.explain}</div>
          </article>
        `).join("")}
      `;
      $$(".quiz-option").forEach(btn => btn.addEventListener("click", () => answerQuiz(btn)));
    }

    function answerQuiz(btn) {
      const q = quizzes[Number(btn.dataset.index)];
      const selected = Number(btn.dataset.option);
      const card = btn.closest(".quiz-card");
      card.querySelectorAll(".quiz-option").forEach(item => {
        item.disabled = true;
        const option = Number(item.dataset.option);
        if (option === q.answer) item.classList.add("correct");
        if (option === selected && selected !== q.answer) item.classList.add("wrong");
      });
      card.querySelector(".answer").classList.add("show");
    }

    function renderSearchResults(keyword) {
      if (!currentUser) {
        showToast("请先登录后使用搜索");
        switchView("auth");
        return;
      }
      const kw = keyword.trim().toLowerCase();
      const list = kw ? terms.filter(t => [t.name, t.category, t.desc, t.plain, t.example].some(v => v.toLowerCase().includes(kw))) : [];
      activeView = "searchResults";
      $$(".view").forEach(view => view.classList.remove("active"));
      $("#searchResults").classList.add("active");
      renderNav();
      $("#searchResults").innerHTML = `
        <div class="section-title">
          <div><h2>搜索结果</h2><p class="muted">关键词：${escapeHtml(keyword)}</p></div>
          <span class="chip">${list.length} 条结果</span>
        </div>
        ${list.length ? `<div class="grid term-list">${list.map(termCardHtml).join("")}</div>` : `<div class="glass-card empty">没有找到相关术语，请尝试搜索“UI”“API Key”“响应式布局”等关键词。</div>`}
      `;
    }

    function initTheme() {
      const saved = localStorage.getItem("ai-term-theme");
      if (saved === "light") document.body.classList.add("light");
      updateThemeButton();
      $("#themeToggle").addEventListener("click", () => {
        document.body.classList.toggle("light");
        localStorage.setItem("ai-term-theme", document.body.classList.contains("light") ? "light" : "dark");
        updateThemeButton();
      });
    }

    function updateThemeButton() {
      $("#themeToggle").textContent = document.body.classList.contains("light") ? "科技深色风格" : "明亮风格";
    }

    function initSearch() {
      $("#searchInput").addEventListener("input", (e) => {
        const value = e.target.value.trim();
        if (value.length === 0) {
          switchView(activeView === "searchResults" ? "home" : activeView);
          return;
        }
        renderSearchResults(value);
      });
    }

    function init() {
      loadCurrentUser();
      renderNav();
      renderHome();
      renderAuth();
      renderDictionary();
      renderCards();
      renderGraph();
      renderCases();
      renderBuilder();
      renderQuiz();
      renderAdmin();
      initTheme();
      initSearch();
    }

    init();
  </script>
</body>
</html>
